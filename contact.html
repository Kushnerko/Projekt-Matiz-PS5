<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <div id="contact-section">
        <h1 style="color: #ff8c00; text-align: center; margin-bottom: 20px;">Kontakt</h1>

        <form id="contact-form" novalidate>
            <input type="text" id="name" placeholder="Imię (min. 3 znaki)" style="width: 100%;">
            <div id="name-error" class="error-msg"></div>

            <input type="email" id="email" placeholder="Adres E-mail" style="width: 100%;">
            <div id="email-error" class="error-msg"></div>

            <textarea id="message" rows="5" placeholder="Wpisz treść wiadomości..." style="width: 100%;"></textarea>
            <div id="message-error" class="error-msg"></div>

            <button type="submit" id="submit-btn" style="margin-top: 10px;">Wyślij wiadomość</button>
            <div id="success-msg"></div>
        </form>
    </div>

    <script src="contact.js"></script>
</body>
</html>
