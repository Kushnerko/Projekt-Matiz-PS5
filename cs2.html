<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esport Site</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212; 
            color: #ffffff; 
            line-height: 1.6;
        }

        #cs2-banner {
            min-height: 200px;
        }

        #cs2-banner img {
            width: 100%;
            max-height: 450px;
            object-fit: cover;
            display: block;
        }

        #wybor {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 60px 20px;
            flex-wrap: wrap;
        }

        .wybor {
            background-color: #1e1e1e;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            overflow: hidden;
            width: 320px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .wybor:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(255, 140, 0, 0.2);
        }

        .wybor img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 4px solid #ff8c00;
        }

        .wybor p {
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        footer {
            text-align: center;
            padding: 25px;
            background-color: #0a0a0a;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body> 
    <section id="cs2-banner">
        <img src="csbaner.png" id="cs2Banner" alt="CS2 Banner">
    </section>

    <section id="wybor">
        <a href="Teams.html" class="wybor">
            <img src="virtus.jpg" alt="Teams">
            <p>TEAMS</p>    
        </a>
       
        <a href="Tournaments.html" class="wybor">
            <img src="major.jpg" alt="Tournaments">
            <p>TOURNAMENTS</p>    
        </a>

        <a href="Updates.html" class="wybor">
            <img src="cs2-updates.jfif" alt="Updates">
            <p>UPDATES</p>
        </a>
    </section>

    <footer>
        <p>Made by: Matiz Krol Szos</p>
    </footer>
</body>
</html>
